<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbox3 — Demo</title>
  <link rel="stylesheet" href="/dist/lightbox3.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 120px;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 48px;
      font-size: 1.1rem;
    }

    h2 {
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin: 48px 0 16px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .gallery a {
      display: block;
      border-radius: 0;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #1a1a1a;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .single-image {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .single-image a {
      display: block;
      border-radius: 0;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #1a1a1a;
    }

    .single-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .text-links a {
      color: #6ea8fe;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .text-links a:hover {
      color: #9ec5fe;
    }

    .text-links ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <h1>Lightbox3</h1>
  <p class="subtitle">Click any thumbnail. Spring-animated zoom. Click or press Esc to close.</p>

  <h2>Text Links</h2>
  <div class="text-links">
    <ul>
      <li><a href="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2400&q=80" data-lightbox>Yosemite Valley at sunrise</a></li>
      <li><a href="https://images.unsplash.com/photo-1431576901776-e539bd916ba2?w=2400&q=80" data-lightbox>Golden glass towers</a></li>
      <li><a href="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=2400&q=80" data-lightbox>Fairy Glen sunset spiral</a></li>
    </ul>
  </div>

  <h2>Single Image</h2>
  <div class="single-image">
    <a href="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=2400&q=80" data-lightbox data-caption="Forest bridge walkway">
      <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=300&fit=crop&q=80" alt="Forest bridge walkway">
    </a>
  </div>

  <h2>Gallery — Nature</h2>
  <div class="gallery">
    <a href="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2400&q=80" data-lightbox="nature" data-caption="Yosemite Valley at sunrise">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400&h=300&fit=crop&q=80" alt="Yosemite Valley at sunrise">
    </a>
    <a href="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=2400&q=80" data-lightbox="nature" data-caption="Mountain ridgeline with sunrays piercing through the clouds — one of those fleeting moments where the light does something extraordinary and you just have to stop and take it in">
      <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop&q=80" alt="Mountain ridgeline with sunrays">
    </a>
    <a href="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=2400&q=80" data-lightbox="nature" data-caption="Fairy Glen sunset spiral, Isle of Skye, Scotland. The ancient stone spiral sits in a natural amphitheatre of grassy mounds and miniature hills that locals have long associated with fairy folklore. Late evening light catches the concentric rings just right, turning the whole glen golden for a few minutes before dusk settles in.">
      <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=300&fit=crop&q=80" alt="Fairy Glen sunset">
    </a>
    <a href="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=2400&q=80" data-lightbox="nature" data-caption="Multnomah Falls">
      <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=300&fit=crop&q=80" alt="Multnomah Falls">
    </a>
    <a href="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=2400&q=80" data-lightbox="nature" data-caption="Misty green highlands at dawn">
      <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=300&fit=crop&q=80" alt="Misty green highlands">
    </a>
    <a href="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=2400&q=80" data-lightbox="nature">
      <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=300&fit=crop&q=80" alt="Forest bridge walkway">
    </a>
  </div>

  <h2>Gallery — Architecture</h2>
  <div class="gallery">
    <a href="https://images.unsplash.com/photo-1431576901776-e539bd916ba2?w=2400&q=80" data-lightbox="architecture" data-caption="Golden glass towers">
      <img src="https://images.unsplash.com/photo-1431576901776-e539bd916ba2?w=400&h=300&fit=crop&q=80" alt="Golden glass towers">
    </a>
    <a href="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=2400&q=80" data-lightbox="architecture" data-caption="White angular modern building">
      <img src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=400&h=300&fit=crop&q=80" alt="White angular building">
    </a>
    <a href="https://images.unsplash.com/photo-1488972685288-c3fd157d7c7a?w=2400&q=80" data-lightbox="architecture" data-caption="Geometric facade angles">
      <img src="https://images.unsplash.com/photo-1488972685288-c3fd157d7c7a?w=400&h=300&fit=crop&q=80" alt="Geometric facade">
    </a>
    <a href="https://images.unsplash.com/photo-1479839672679-a46483c0e7c8?w=2400&q=80" data-lightbox="architecture" data-caption="White minimalist cubes">
      <img src="https://images.unsplash.com/photo-1479839672679-a46483c0e7c8?w=400&h=300&fit=crop&q=80" alt="White minimalist building">
    </a>
  </div>

  <script type="module" src="/dist/lightbox3.esm.js"></script>
</body>
</html>
