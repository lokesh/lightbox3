<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbox3 — Demo</title>
  <link rel="stylesheet" href="/dist/lightbox3.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 120px;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 48px;
      font-size: 1.1rem;
    }

    h2 {
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin: 48px 0 16px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .gallery a {
      display: block;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: #1a1a1a;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .single-image a {
      display: inline-block;
      border-radius: 12px;
      overflow: hidden;
    }

    .single-image img {
      max-width: 400px;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Lightbox3</h1>
  <p class="subtitle">Click any thumbnail. Spring-animated zoom. Click or press Esc to close.</p>

  <h2>Single Image</h2>
  <div class="single-image">
    <a href="https://picsum.photos/id/10/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/10/400/267" alt="A calm forest trail">
    </a>
  </div>

  <h2>Gallery — Nature</h2>
  <div class="gallery">
    <a href="https://picsum.photos/id/15/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/15/400/267" alt="Misty mountains">
    </a>
    <a href="https://picsum.photos/id/16/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/16/400/267" alt="Ocean waves">
    </a>
    <a href="https://picsum.photos/id/29/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/29/400/267" alt="Wild flowers">
    </a>
    <a href="https://picsum.photos/id/36/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/36/400/267" alt="Snow mountains">
    </a>
    <a href="https://picsum.photos/id/37/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/37/400/267" alt="Mountain lake">
    </a>
    <a href="https://picsum.photos/id/39/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/39/400/267" alt="Autumn forest">
    </a>
  </div>

  <h2>Gallery — Architecture</h2>
  <div class="gallery">
    <a href="https://picsum.photos/id/101/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/101/400/267" alt="Glass building">
    </a>
    <a href="https://picsum.photos/id/164/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/164/400/267" alt="Industrial architecture">
    </a>
    <a href="https://picsum.photos/id/175/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/175/400/267" alt="Concrete stairs">
    </a>
    <a href="https://picsum.photos/id/188/2400/1600" data-lightbox>
      <img src="https://picsum.photos/id/188/400/267" alt="Building from below">
    </a>
  </div>

  <script type="module" src="/dist/lightbox3.esm.js"></script>
</body>
</html>
